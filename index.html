<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发票管理系统</title>
    <link rel="stylesheet" href="static/css/style.css">
    <script src="static/js/vendor/pdf.min.js"></script>
    <script src="static/js/vendor/xlsx.full.min.js"></script>
    <script src="static/js/vendor/dexie.min.js"></script>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <span>发票管理系统</span>
        </div>
        <div class="nav-actions">
            <button class="btn btn-primary" id="btnUpload">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                导入发票
            </button>
            <button class="btn btn-secondary" id="btnSettings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                系统设置
            </button>
        </div>
    </nav>

    <!-- 统计卡片 -->
    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">发票总数</div>
        </div>
        <div class="stat-card stat-warning">
            <div class="stat-value" id="statDuplicate">0</div>
            <div class="stat-label">重复发票</div>
        </div>
        <div class="stat-card stat-danger">
            <div class="stat-value" id="statMismatch">0</div>
            <div class="stat-label">收票方异常</div>
        </div>
        <div class="stat-card stat-success">
            <div class="stat-value" id="statAmount">¥0.00</div>
            <div class="stat-label">价税合计总额</div>
        </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <div class="toolbar-left">
            <div class="filter-group">
                <input type="text" id="filterMonth" placeholder="报销月 (YYYY-MM)" class="filter-input">
                <input type="text" id="filterPerson" placeholder="报销人" class="filter-input">
                <select id="filterType" class="filter-select">
                    <option value="">全部类型</option>
                </select>
                <input type="text" id="filterBuyer" placeholder="收票主体" class="filter-input">
                <input type="text" id="filterInvoiceNumber" placeholder="发票号" class="filter-input">
                <button class="btn btn-sm" id="btnFilter">筛选</button>
                <button class="btn btn-sm btn-ghost" id="btnClearFilter">清除</button>
            </div>
        </div>
        <div class="toolbar-right">
            <button class="btn btn-sm btn-warning" id="btnCheckDup">重复检测</button>
            <button class="btn btn-sm btn-warning" id="btnCheckBuyer">收票方校验</button>
            <button class="btn btn-sm btn-success" id="btnExport">导出Excel</button>
            <button class="btn btn-sm btn-danger" id="btnBatchDelete">批量删除</button>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="table-container">
        <table class="data-table" id="invoiceTable">
            <thead>
                <tr>
                    <th class="col-checkbox"><input type="checkbox" id="selectAll"></th>
                    <th class="col-sortable" data-sort="invoice_type">发票类型</th>
                    <th class="col-sortable" data-sort="invoice_number">发票号码</th>
                    <th class="col-sortable" data-sort="invoice_date">开票日期</th>
                    <th>购买方名称</th>
                    <th>购买方税号</th>
                    <th>销售方名称</th>
                    <th class="col-sortable" data-sort="total_amount">价税合计</th>
                    <th class="col-sortable" data-sort="reimburse_category">报销分类</th>
                    <th class="col-sortable" data-sort="reimburse_person">报销人</th>
                    <th class="col-sortable" data-sort="reimburse_month">报销月</th>
                    <th class="col-sortable" data-sort="import_time">导入时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr class="empty-row">
                    <td colspan="13" class="empty-message">暂无发票数据，点击上方「导入发票」按钮开始</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 上传弹窗 -->
    <div class="modal" id="uploadModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>导入发票</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="upload-area" id="uploadArea">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p>拖拽PDF文件到此处，或 <span class="upload-link">点击选择</span></p>
                    <p class="upload-hint">支持批量上传，仅接受PDF格式</p>
                    <input type="file" id="fileInput" accept=".pdf" multiple hidden>
                </div>
                <div class="upload-results" id="uploadResults"></div>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal" id="settingsModal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-wide">
            <div class="modal-header">
                <h3>系统设置</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 收票方主体管理 -->
                <div class="form-group">
                    <label>收票方主体（导入时通过购买方名称匹配对应主体）</label>
                    <div class="company-list" id="companyList">
                        <div class="company-empty">暂无收票方主体，请添加</div>
                    </div>
                </div>

                <div class="company-add-form">
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="newCompanyName" placeholder="公司名称">
                        </div>
                        <div class="form-group">
                            <input type="text" id="newCompanyTaxId" placeholder="纳税人识别号">
                        </div>
                        <button class="btn btn-primary" id="btnAddCompany">添加</button>
                    </div>
                </div>

                <hr class="modal-divider">

                <div class="form-actions">
                    <button class="btn btn-secondary" id="btnBackup">备份数据库</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal" id="editModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑发票信息</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 发票基本信息（只读） -->
                <div class="invoice-info-section">
                    <div class="info-grid">
                        <div class="info-item"><span class="info-label">发票号码</span><span class="info-value" id="infoInvoiceNumber">-</span></div>
                        <div class="info-item"><span class="info-label">开票日期</span><span class="info-value" id="infoInvoiceDate">-</span></div>
                        <div class="info-item"><span class="info-label">购买方</span><span class="info-value" id="infoBuyerName">-</span></div>
                        <div class="info-item"><span class="info-label">销售方</span><span class="info-value" id="infoSellerName">-</span></div>
                        <div class="info-item"><span class="info-label">价税合计</span><span class="info-value" id="infoTotalAmount">-</span></div>
                    </div>
                </div>

                <!-- 开票明细（只读，多行） -->
                <div class="form-group" id="detailsGroup" style="display:none;">
                    <label>开票明细</label>
                    <div class="item-details" id="infoItemDetails"></div>
                </div>

                <hr class="modal-divider">

                <!-- 可编辑字段 -->
                <div class="form-row">
                    <div class="form-group">
                        <label>报销分类</label>
                        <input type="text" id="editCategory" placeholder="输入或选择分类" list="categoryList">
                        <datalist id="categoryList"></datalist>
                    </div>
                    <div class="form-group">
                        <label>报销人</label>
                        <input type="text" id="editPerson" placeholder="输入报销人姓名">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>报销月</label>
                        <input type="text" id="editMonth" placeholder="YYYY-MM">
                    </div>
                </div>
                <div class="form-group">
                    <label>我的报销备注</label>
                    <textarea id="editRemark" rows="3" placeholder="输入备注..."></textarea>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" id="btnSaveEdit">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="static/js/app-browser.js"></script>
</body>
</html>
